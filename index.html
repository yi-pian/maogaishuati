<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>期末刷题</title>
    <link rel="stylesheet" href="styles.css?v=20260709-sync2">
    <script src="questions.js"></script>
    <script src="app.js?v=20260709-sync2" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M5 4.8c0-.9.7-1.6 1.6-1.6h10.8c.9 0 1.6.7 1.6 1.6v14.4c0 .9-.7 1.6-1.6 1.6H6.6c-.9 0-1.6-.7-1.6-1.6V4.8Z"></path>
            <path d="M8 7h8M8 11h8M8 15h5"></path>
          </svg>
        </div>
        <div>
          <h1>期末刷题</h1>
          <div class="meta-line" id="bankStats"></div>
        </div>
      </div>
      <nav class="mode-tabs" aria-label="刷题模式">
        <button class="tab-button active" type="button" data-mode="practice">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5V5.2c0-.7.5-1.2 1.2-1.2H19v15.5H5.2c-.7 0-1.2-.5-1.2-1.2Z"></path><path d="M8 8h7M8 12h8M8 16h5"></path></svg>
          <span>顺序刷题</span>
        </button>
        <button class="tab-button" type="button" data-mode="random">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="m15 15 6 6"></path><path d="M4 4l5 5"></path></svg>
          <span>随机刷题</span>
        </button>
        <button class="tab-button" type="button" data-mode="exam">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8l3 3v14H5V3h3Z"></path><path d="M8 8h8M8 12h8M8 16h5"></path></svg>
          <span>考试模式</span>
        </button>
        <button class="tab-button" type="button" data-mode="mistakes">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3.8 20h16.4L12 3Z"></path><path d="M12 9v5M12 17h.01"></path></svg>
          <span>错题集</span>
        </button>
      </nav>
    </header>

    <main class="app-shell">
      <section class="workspace" id="mainPanel" aria-live="polite"></section>
      <aside class="side-panel" id="sidePanel"></aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
